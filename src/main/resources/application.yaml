server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${HMDP_DB_URL:jdbc:mysql://127.0.0.1:3307/dianping?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${HMDP_DB_USERNAME:root}
    password: ${HMDP_DB_PASSWORD:}
  redis:
    host: 127.0.0.1
    port: 6379
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
mybatis-plus:
  type-aliases-package: com.hmdp.entity
logging:
  level:
    com.hmdp: debug
  pattern:
    dateformat: mm:ss.SSS
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: hmdp-seckill-producer
hmdp:
  mq:
    retry-fixed-delay: 5000
  rate-limit:
    # Keep false for direct local access. Enable only when requests always pass through a trusted proxy.
    trust-forwarded-headers: false
  cache:
    shop:
      local:
        # L1 is intentionally shorter than Redis (L2) so a missed invalidation is bounded.
        ttl-seconds: 60
        max-size: 10000
      bloom:
        name: cache:bloom:shop:v1
        expected-insertions: 100000
        false-probability: 0.01
    voucher:
      local:
        # Static voucher metadata only; live seckill stock remains in Redis.
        ttl-seconds: 60
        max-size: 10000
